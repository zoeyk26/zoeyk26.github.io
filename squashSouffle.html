<!DOCTYPE html>
<html>
<head>
	<style>
		body {
			background-color:#CBC3E3;
		}
		.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  letter-spacing: 1px;
  margin: 10px 0;
}
.lists {
  width: fit-content;
  margin: 0 auto;  
}

.lists ul,
.lists ol {
  text-align: left; 
}
.recipe-container { 
	display: flex; 
	justify-content: center; 
	gap: 30px; margin: 40px auto; 
	width: 80%; 
} 
.sidebar { 
	width: 220px; 
	background-color: lightpink; 
	padding: 20px; border-radius: 15px; 
	text-align: center; 
	box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
} 
.sidebar h3 { 
	margin-bottom: 20px; 
} 
.info-box { 
	margin-bottom: 20px; 
	padding: 10px; 
	background-color: hotpink; 
	border-radius: 10px; 
} 
.content { 
	flex: 1; 
	background-color: lightblue; 
	padding: 25px; 
	border-radius: 15px; 
	box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
} 
.content ul, 
.content ol { 
	padding-left: 20px; 
} /* mobile */ 
@media (max-width: 700px) { 
	.recipe-container { 
		flex-direction: column; 
		align-items: center; 
	} .sidebar { 
		width: 100%;
		 } 
		}
	</style>
	<title>Mima's Squash Souffle</title>
</head>
<body>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<div class="header">
	<h1>Mima's Squash Souffle</h1>
</div>

</body>
</html>
